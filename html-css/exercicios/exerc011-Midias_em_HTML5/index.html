<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.png" type="image/x-icon">
    <title>Midias em HTML5</title>
</head>
<body>
 
    <h1>Imagem dinâmica</h1>    
    <p>Tente abrir esse site em dispositivos diferentes <br> ou simplesmente aumente e diminua o tamanho do seu navegador.
    </p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexível">
    </picture>
    <h1>Reproduzindo áudios</h1>
    <p>
        Vamos aprender a reproduizr áudios em HTML5.
    </p>
    <audio preload="metadata" controls>
        <source src="midia/keyboard-typing-sound-effect.mp3" type="audio/mpeg">
        <source src="midia/keyboard-typing-sound-effect (online-audio-converter.com).ogg" type="midia/ogg">
        <source src="midia/keyboard-typing-sound-effect (online-audio-converter.com).wav" type="midia/wav">
        <p>
            Infelizmente, seu navegador não suporta a faixa de áudio. <br> Clique aqui para baixar o arquivo: <a href="midia/keyboard-typing-sound-effect.mp3">keyboard-typing-sound-effect.mp3</a>
        </p>
    </audio>


</body>
</html>
