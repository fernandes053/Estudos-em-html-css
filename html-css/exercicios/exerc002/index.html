<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    
<h1>Parágrafos e quebra de linha</h1>
<hr>
<p>
    Você pode escrever um parágrafo de qualquer jeito.
    Basta você colocar ele entre as tags "&lt;p&gt;" e "&lt;/p&gt;"!
</p>
<p>Se você quiser quebrar uma linha voce deve usar a tag "&lt;br&gt;",<br>como feito agora.</p>

</body>
</html>
