<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.png" type="image/x-icon">
    <title>Listas</title>
</head>
<body>

<h1>Trabalhando com listas</h1>    

<h2>Listas Ordenadas</h2>
<ol type="1" start="4"> <!--tipos: 1 A a I i-->
    <li>Acordar</li>
    <li>Escovar os dentes</li>
    <li>Tomar café</li>
    <li>Ligar para joão</li>
    <li>Lavar roupas</li>
</ol>

<ol type="A">
    <li>Acordar</li>
    <li>Dirigir até o trabalho</li>
    <li>tomar café</li>
    <li>trablhar</li>
    <li>almoçar</li>
</ol>

<h2>Listas não ordenadas</h2>
<ul type="square"> <!--tipos: circle, square e disc-->
    <li>Pão</li>
    <li>Manteiga</li>
    <li>Farinha</li>
    <li>Leite</li>
</ul>

</body>
</html>
