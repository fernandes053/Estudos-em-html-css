<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.png">
    <title>Desafio 06-Tags</title>
</head>
<body>
    <h1>Desafio 06-Tags</h1>
    <hr>
    <p>
        Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse <br>sobre os termos para descobrir qual tag deverá utilizar em cada caso.
    </p>
    <ul>
        <li type="square" title="&lt;p&gt;">
            Parágrafos
        </li>
        <li type="square" title="&lt;img&gt;">
            Imagens
        </li>
        <li type="square" title="&lt;abbr&gt;">
            Abreviações
        </li>
        <li type="square" title="&lt;code&gt;">
            Códigos-fonte
        </li>
        <li type="square" title="&lt;ol&gt;">
            Listas numeradas
        </li>
        <li type="square" title="&lt;ul&gt;">
            Listas enumeradas
        </li>
    </ul>
</body>
</html>
